<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A Rastro — Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #101A14; -webkit-font-smoothing: antialiased; font-family: 'DM Sans', sans-serif; color: #1A2E24; }
  #root { height: 100%; }
  button { font-family: inherit; }
  input { font-family: inherit; }
  input::placeholder { color: #B0BCB4; }
  ::selection { background: rgba(27,94,58,0.22); }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 920px) {
    .grid-4, .grid-3, .grid-2, .hero-bottom { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

// Shim de ícones lucide como SVG inline (paths verbatim do lucide v0.383)
const ICONS = {
  ArrowRight: '<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',
  ArrowLeft: '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
  Check: '<path d="M20 6 9 17l-5-5"/>',
  X: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
  Search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
  Wallet: '<path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/>',
  ExternalLink: '<path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>',
  ShieldCheck: '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/>',
  MapPin: '<path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/>',
  Leaf: '<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6"/>',
  FileCheck: '<path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="m9 15 2 2 4-4"/>',
  Share2: '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/>',
  Briefcase: '<path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect width="20" height="14" x="2" y="6" rx="2"/>',
  CircleCheck: '<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>',
  CircleAlert: '<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>',
  Clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  ChevronRight: '<path d="m9 18 6-6-6-6"/>',
  Sparkles: '<path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/><path d="M20 3v4"/><path d="M22 5h-4"/><path d="M4 17v2"/><path d="M5 18H3"/>',
  Eye: '<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/>',
  Download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>',
  Layers: '<path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z"/><path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"/><path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"/>',
  Lock: '<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
};

function makeIcon(inner) {
  return function Icon({ size = 24, color = "currentColor", strokeWidth = 2, style }) {
    return React.createElement("svg", {
      width: size, height: size, viewBox: "0 0 24 24",
      fill: "none", stroke: color, strokeWidth: strokeWidth,
      strokeLinecap: "round", strokeLinejoin: "round",
      style: style, dangerouslySetInnerHTML: { __html: inner },
    });
  };
}
const _I = {};
Object.keys(ICONS).forEach(function(k){ _I[k] = makeIcon(ICONS[k]); });
const ArrowRight=_I.ArrowRight, ArrowLeft=_I.ArrowLeft, Check=_I.Check, X=_I.X, Search=_I.Search, Wallet=_I.Wallet, ExternalLink=_I.ExternalLink, ShieldCheck=_I.ShieldCheck, MapPin=_I.MapPin, Leaf=_I.Leaf, FileCheck=_I.FileCheck, Share2=_I.Share2, Briefcase=_I.Briefcase, CircleCheck=_I.CircleCheck, CircleAlert=_I.CircleAlert, Clock=_I.Clock, ChevronRight=_I.ChevronRight, Sparkles=_I.Sparkles, Eye=_I.Eye, Lock=_I.Lock, Layers=_I.Layers, Download=_I.Download;
const { useState, useEffect } = React;


/* ============================================================
   A RASTRO — Demo (tema escuro premium da marca)
   Home · Exportador/Trader · Importador · Auditor · Auditoria on-chain
   ============================================================ */

const C = {
  bg: "#101A14", bg1: "#13201A", surface: "#18261E", surfaceUp: "#1F2F26", surfaceMax: "#26392E",
  line: "#27362D", lineSoft: "#1F2D25", lineHi: "#35473B",
  forest: "#3D9968", forestHi: "#54B07E", forestDeep: "#1B5E3A",
  forestSoft: "rgba(61,153,104,0.10)", forestBd: "rgba(61,153,104,0.26)", forestBg: "rgba(27,94,58,0.20)",
  sand: "#C9A86A", sandHi: "#DBBE86", terraDeep: "#C47A2A",
  sandSoft: "rgba(201,168,106,0.10)", sandBd: "rgba(201,168,106,0.28)", sandBg: "rgba(201,168,106,0.12)",
  ink: "#EDE8DB", ink1: "#D6D0C0", ink2: "#A6AD9C", ink3: "#7B8377", ink4: "#565E54",
  ok: "#5FB584", okSoft: "rgba(95,181,132,0.12)", okBd: "rgba(95,181,132,0.30)",
  warn: "#D9BC82", warnSoft: "rgba(217,188,130,0.12)", warnBd: "rgba(217,188,130,0.30)",
  bad: "#CE7E66", badSoft: "rgba(206,126,102,0.12)", badBd: "rgba(206,126,102,0.30)",
  info: "#8FA8B8", infoSoft: "rgba(143,168,184,0.12)", infoBd: "rgba(143,168,184,0.28)",
};

const DISPLAY = "'Fraunces', Georgia, serif";
const WORDMARK = "Georgia, 'Times New Roman', serif";
const UI = "'DM Sans', 'Inter', system-ui, sans-serif";
const MONO = "'IBM Plex Mono', ui-monospace, monospace";

/* ---------- LOGO (versão dark da marca) ---------- */
function Mark({ size = 40 }) {
  const id = "rg-" + Math.round(size * 100);
  return (
    <svg width={size} height={size} viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg" style={{ display: "block", flexShrink: 0 }}>
      <defs>
        <linearGradient id={id} x1="0" y1="0.5" x2="1" y2="0.5">
          <stop offset="0%" stopColor="#38996A" /><stop offset="35%" stopColor="#38996A" />
          <stop offset="55%" stopColor="#4AAF7A" /><stop offset="75%" stopColor="#B89040" /><stop offset="100%" stopColor="#D4943A" />
        </linearGradient>
      </defs>
      <path d="M30 150 L30 30 Q30 22, 38 22 L90 22 Q130 22, 130 62 Q130 102, 90 102 L58 102 Q46 102, 54 112 L130 150"
        stroke={`url(#${id})`} strokeWidth="15" strokeLinecap="round" strokeLinejoin="round" fill="none" />
      <circle cx="30" cy="150" r="10" fill="#38996A" /><circle cx="130" cy="150" r="10" fill="#D4943A" />
    </svg>
  );
}
function Logo({ height = 30, onClick }) {
  return (
    <div onClick={onClick} style={{ display: "inline-flex", alignItems: "center", gap: 1, cursor: onClick ? "pointer" : "default", height }}>
      <Mark size={height * 1.08} />
      <span style={{ fontFamily: WORDMARK, fontSize: height * 1.02, fontWeight: 400, color: C.ink, letterSpacing: "-0.05em", marginLeft: -height * 0.16, lineHeight: 1 }}>astro</span>
    </div>
  );
}

/* ---------- PRIMITIVOS ---------- */
function Btn({ children, onClick, kind = "primary", size = "md", icon: Icon, iconRight: IconRight, full }) {
  const sizes = { sm: { p: "8px 14px", f: 13 }, md: { p: "11px 22px", f: 14 }, lg: { p: "14px 28px", f: 15 } };
  const z = sizes[size];
  const kinds = {
    primary: { background: C.forest, color: "#0C1611", border: `1px solid ${C.forest}` },
    sand: { background: C.sand, color: "#1A1306", border: `1px solid ${C.sand}` },
    ghost: { background: "transparent", color: C.ink, border: `1.5px solid ${C.lineHi}` },
    quiet: { background: "transparent", color: C.ink2, border: "1px solid transparent" },
    soft: { background: C.surfaceUp, color: C.ink, border: `1px solid ${C.line}` },
  };
  return (
    <button onClick={onClick} style={{ ...kinds[kind], padding: z.p, fontSize: z.f, fontWeight: 600, fontFamily: UI, borderRadius: 10, cursor: "pointer", display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8, width: full ? "100%" : "auto", transition: "transform .12s, filter .15s, background .15s, border-color .15s", letterSpacing: "-0.01em", whiteSpace: "nowrap" }}
      onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-1px)"; if (kind === "ghost") { e.currentTarget.style.borderColor = C.forest; e.currentTarget.style.background = C.forestSoft; } if (kind === "quiet") e.currentTarget.style.color = C.ink; if (kind === "primary" || kind === "sand") e.currentTarget.style.filter = "brightness(1.06)"; }}
      onMouseLeave={(e) => { e.currentTarget.style.transform = "none"; if (kind === "ghost") { e.currentTarget.style.borderColor = C.lineHi; e.currentTarget.style.background = "transparent"; } if (kind === "quiet") e.currentTarget.style.color = C.ink2; if (kind === "primary" || kind === "sand") e.currentTarget.style.filter = "none"; }}>
      {Icon && <Icon size={z.f + 2} strokeWidth={2} />}{children}{IconRight && <IconRight size={z.f + 1} strokeWidth={2} />}
    </button>
  );
}
function Card({ children, pad = 24, style, onClick, hover }) {
  return (
    <div onClick={onClick} style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 14, padding: pad, cursor: onClick ? "pointer" : "default", transition: "border-color .18s, background .18s, transform .12s", ...style }}
      onMouseEnter={(e) => { if (hover || onClick) { e.currentTarget.style.borderColor = C.lineHi; e.currentTarget.style.background = C.surfaceUp; } }}
      onMouseLeave={(e) => { if (hover || onClick) { e.currentTarget.style.borderColor = C.line; e.currentTarget.style.background = C.surface; } }}>
      {children}
    </div>
  );
}
function Modal({ title, subtitle, eyebrow, onClose, children, footer, wide }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    try { window.addEventListener("keydown", onKey); } catch (e) {}
    return () => { try { window.removeEventListener("keydown", onKey); } catch (e) {} };
  }, [onClose]);
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(8,14,11,0.72)", backdropFilter: "blur(4px)", display: "flex", alignItems: "flex-start", justifyContent: "center", zIndex: 1000, padding: "40px 20px", overflowY: "auto" }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.bg, border: `1px solid ${C.lineHi}`, borderRadius: 16, width: "100%", maxWidth: wide ? 880 : 620, boxShadow: "0 30px 80px rgba(0,0,0,.5)", animation: "rise .22s ease", marginBottom: 40 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "22px 26px", borderBottom: `1px solid ${C.line}`, position: "sticky", top: 0, background: C.bg, borderRadius: "16px 16px 0 0", zIndex: 2 }}>
          <div>
            {eyebrow && <Mini color={C.sand} style={{ letterSpacing: "0.1em", marginBottom: 4 }}>{eyebrow}</Mini>}
            <span style={{ fontFamily: DISPLAY, fontSize: 23, fontWeight: 400, color: C.ink, letterSpacing: "-0.02em" }}>{title}</span>
            {subtitle && <p style={{ fontFamily: UI, fontSize: 13, color: C.ink2, margin: "6px 0 0" }}>{subtitle}</p>}
          </div>
          <button onClick={onClose} aria-label="Fechar" style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 36, height: 36, borderRadius: 9, background: C.surfaceUp, border: `1px solid ${C.line}`, color: C.ink2, cursor: "pointer", flexShrink: 0 }}
            onMouseEnter={(e) => { e.currentTarget.style.color = C.ink; e.currentTarget.style.borderColor = C.lineHi; }}
            onMouseLeave={(e) => { e.currentTarget.style.color = C.ink2; e.currentTarget.style.borderColor = C.line; }}>
            <X size={18} />
          </button>
        </div>
        <div style={{ padding: 26 }}>{children}</div>
        <div style={{ padding: "18px 26px", borderTop: `1px solid ${C.line}`, display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center", position: "sticky", bottom: 0, background: C.bg, borderRadius: "0 0 16px 16px" }}>
          {footer}
          <button onClick={onClose} style={{ fontFamily: UI, fontSize: 13, fontWeight: 500, color: C.ink3, background: "transparent", border: "none", cursor: "pointer", marginLeft: "auto" }}>Fechar</button>
        </div>
      </div>
    </div>
  );
}

const SELO = {
  pronto: { label: "Pronto", c: C.ok, bg: C.okSoft, bd: C.okBd, dot: C.ok },
  pendente: { label: "Revisão necessária", c: C.warn, bg: C.warnSoft, bd: C.warnBd, dot: C.warn },
  bloq: { label: "Sinalizado", c: C.bad, bg: C.badSoft, bd: C.badBd, dot: C.bad },
  proc: { label: "Em processamento", c: C.info, bg: C.infoSoft, bd: C.infoBd, dot: C.info },
};
function Selo({ kind = "pronto", size = "md", text }) {
  const s = SELO[kind];
  const z = size === "lg" ? { f: 13, p: "7px 14px", dot: 7 } : size === "sm" ? { f: 11, p: "4px 10px", dot: 5 } : { f: 12, p: "6px 12px", dot: 6 };
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 7, fontFamily: UI, fontSize: z.f, fontWeight: 600, color: s.c, background: s.bg, border: `1px solid ${s.bd}`, padding: z.p, borderRadius: 999, whiteSpace: "nowrap", letterSpacing: "-0.005em" }}>
      <span style={{ width: z.dot, height: z.dot, borderRadius: "50%", background: s.dot }} />{text || s.label}
    </span>
  );
}
function Eyebrow({ children, accent = C.sand }) {
  return <p style={{ fontFamily: UI, fontSize: 11.5, fontWeight: 600, letterSpacing: "0.16em", textTransform: "uppercase", color: accent, margin: "0 0 16px" }}>{children}</p>;
}
function H1({ children, size = 56 }) { return <h1 style={{ fontFamily: DISPLAY, fontSize: size, fontWeight: 400, lineHeight: 1.08, color: C.ink, margin: 0, letterSpacing: "-0.025em" }}>{children}</h1>; }
function H2({ children, size = 36 }) { return <h2 style={{ fontFamily: DISPLAY, fontSize: size, fontWeight: 400, lineHeight: 1.15, color: C.ink, margin: 0, letterSpacing: "-0.02em" }}>{children}</h2>; }
function H3({ children }) { return <h3 style={{ fontFamily: UI, fontSize: 17, fontWeight: 600, lineHeight: 1.3, color: C.ink, margin: 0, letterSpacing: "-0.015em" }}>{children}</h3>; }
function Lead({ children, max = 660, color = C.ink2 }) { return <p style={{ fontFamily: UI, fontSize: 17, color, lineHeight: 1.55, margin: "18px 0 0", maxWidth: max }}>{children}</p>; }
function Body({ children, color = C.ink2, size = 14 }) { return <p style={{ fontFamily: UI, fontSize: size, color, lineHeight: 1.6, margin: 0 }}>{children}</p>; }
function Mini({ children, color = C.ink3, style }) { return <p style={{ fontFamily: UI, fontSize: 12, color, lineHeight: 1.5, margin: 0, letterSpacing: "-0.005em", ...(style || {}) }}>{children}</p>; }
function Row({ k, v, mono, last }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", gap: 16, padding: "11px 0", borderBottom: last ? "none" : `1px solid ${C.lineSoft}`, fontFamily: UI, fontSize: 13.5 }}>
      <span style={{ color: C.ink3, flexShrink: 0 }}>{k}</span>
      <span style={{ color: C.ink1, textAlign: "right", fontFamily: mono ? MONO : UI, fontSize: mono ? 12 : 13.5, wordBreak: mono ? "break-all" : "normal", marginLeft: 24 }}>{v}</span>
    </div>
  );
}

/* fluxo Exportador → Trader → Importador → Auditor, com etapa ativa destacada */
function FluxoCirculacao({ ativo, onNav }) {
  const etapas = [
    ["exportador", "Exportador", "organiza"],
    ["exportador", "Trader", "consolida"],
    ["importador", "Importador", "revisa"],
    ["auditor", "Auditor", "verifica"],
  ];
  return (
    <div style={{ display: "flex", alignItems: "stretch", gap: 0, flexWrap: "wrap" }}>
      {etapas.map(([rota, nome, verbo], i) => {
        const on = ativo === rota;
        return (
          <React.Fragment key={nome}>
            <div onClick={onNav ? () => onNav(rota) : undefined} style={{ flex: "1 1 0", minWidth: 116, background: on ? C.forestSoft : C.surface, border: `1px solid ${on ? C.forestBd : C.line}`, borderRadius: 12, padding: "14px 16px", cursor: onNav ? "pointer" : "default", transition: "border-color .15s, background .15s" }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: i === 3 ? C.sand : on ? C.forestHi : C.forest, marginBottom: 9 }} />
              <p style={{ fontFamily: UI, fontSize: 14, fontWeight: 600, color: on ? C.forestHi : C.ink, margin: 0, letterSpacing: "-0.01em" }}>{nome}</p>
              <Mini color={C.ink3} style={{ marginTop: 2 }}>{verbo}</Mini>
            </div>
            {i < etapas.length - 1 && <div style={{ display: "flex", alignItems: "center", padding: "0 6px", flexShrink: 0 }} className="fluxo-arrow"><ArrowRight size={15} color={C.ink4} /></div>}
          </React.Fragment>
        );
      })}
    </div>
  );
}

/* faixa de identificação do ator no topo de cada dashboard */
function ActorBar({ rota, nav }) {
  const meta = {
    exportador: { label: "Exportador / Trader", papel: "Organiza e consolida o caso", c: C.forest, ic: Layers },
    importador: { label: "Importador", papel: "Revisa o caso recebido", c: C.info, ic: Eye },
    auditor: { label: "Auditor", papel: "Verifica consistência e integridade", c: C.sand, ic: ShieldCheck },
  }[rota];
  const Ic = meta.ic;
  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16, marginBottom: 22 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ width: 40, height: 40, borderRadius: 10, background: `${meta.c}1f`, border: `1px solid ${meta.c}55`, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Ic size={19} color={meta.c} strokeWidth={1.8} />
        </div>
        <div>
          <p style={{ fontFamily: UI, fontSize: 16, fontWeight: 700, color: C.ink, margin: 0, letterSpacing: "-0.01em" }}>Dashboard · {meta.label}</p>
          <Mini color={C.ink3} style={{ marginTop: 2 }}>{meta.papel}</Mini>
        </div>
      </div>
      <div style={{ minWidth: 300, flex: "0 1 480px" }}>
        <FluxoCirculacao ativo={rota} onNav={nav} />
      </div>
    </div>
  );
}

const wrap = { maxWidth: 1180, margin: "0 auto", padding: "0 32px" };

/* ============================================================
   NAV (5 destinos) + FOOTER + SECTION
   ============================================================ */
function TopNav({ nav, route, walletConnected, onConnectWallet }) {
  const dests = [
    ["exportador", "Exportador / Trader"],
    ["importador", "Importador"],
    ["auditor", "Auditor"],
    ["territorio", "Território"],
  ];
  const isDash = (r) => r === route;
  return (
    <div style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(16,26,20,0.88)", backdropFilter: "blur(14px)", borderBottom: `1px solid ${C.line}` }}>
      <div style={{ ...wrap, padding: "14px 32px", display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16 }}>
        <Logo height={26} onClick={() => nav("home")} />
        <div style={{ display: "flex", alignItems: "center", gap: 4 }} className="nav-links">
          {dests.map(([r, label]) => (
            <button key={r} onClick={() => nav(r)} style={{

            <input value={q} onChange={(e) => setQ(e.target.value)} onKeyDown={(e) => e.key === "Enter" && buscar()} placeholder={`Ex.: ${AUD.car}`}
              style={{ flex: 1, minWidth: 260, background: C.bg, border: `1px solid ${C.line}`, borderRadius: 10, padding: "13px 16px", fontFamily: MONO, fontSize: 13, color: C.ink, outline: "none", transition: "border-color .15s" }}
              onFocus={(e) => (e.currentTarget.style.borderColor = C.forest)} onBlur={(e) => (e.currentTarget.style.borderColor = C.line)} />
            <Btn icon={Search} onClick={buscar}>Verificar</Btn>
          </div>
          <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
            <span onClick={() => setQ(AUD.car)} style={{ fontFamily: MONO, fontSize: 11.5, color: C.forestHi, cursor: "pointer" }}>↳ usar CAR de exemplo</span>
            {erro && <p style={{ fontFamily: UI, fontSize: 12.5, color: C.bad, margin: 0, fontWeight: 500 }}>CAR não encontrado. Confira o valor.</p>}
          </div>
        </Card>

        {resultado && (
          <>
            <Card pad={32} style={{ marginBottom: 20, background: `linear-gradient(135deg, ${C.surface} 0%, ${C.forestSoft} 120%)`, borderColor: C.lineHi }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 24, marginBottom: 24 }}>
                <div><Mini color={C.ink3}>RESULTADO DA AUDITORIA</Mini><p style={{ fontFamily: MONO, fontSize: 14, color: C.ink1, margin: "8px 0 0", wordBreak: "break-all" }}>{resultado.car}</p></div>
                <Selo kind={resultado.selo} size="lg" />
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 0 }} className="grid-2">
                <div>
                  <Row k="Status cadastral" v={<span style={{ color: C.ok, fontWeight: 600 }}>{resultado.statusCadastral}</span>} />

                <div>
                  <Row k="Selo do caso" v={<Selo kind={resultado.selo} size="sm" />} />
                  <Row k="Hash principal" v={resultado.hashPrincipal.slice(0, 22) + "…"} mono />
                  <Row k="Status verificável" v={<span style={{ color: C.ok, fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 5 }}><ShieldCheck size={13} />Conferido</span>} last />

              </div>
              <div style={{ marginTop: 20, padding: "14px 18px", background: C.bg, border: `1px solid ${C.line}`, borderRadius: 10 }}>
                <Mini color={C.ink3}>HASH PRINCIPAL COMPLETO</Mini>

              </div>
            </Card>
            <div style={{ marginBottom: 28 }}>
              <Mini color={C.ink3}>EVIDÊNCIAS POR CAMADA</Mini>
              <div style={{ marginTop: 14, display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 12 }} className="grid-2">
                {resultado.evidencias.map((e) => (
                  <div key={e.camada} style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 12, padding: 20, transition: "border-color .15s" }}

                    </div>
                    <p style={{ fontFamily: MONO, fontSize: 11.5, color: C.ink2, margin: "0 0 14px", wordBreak: "break-all", lineHeight: 1.45 }}>{e.hash.slice(0, 36)}…</p>
                    <Btn size="sm" kind="ghost" iconRight={ExternalLink} onClick={() => { try { window.open(LINKS.auditoria, "_blank"); } catch (e) {} }}>Ver no Etherscan</Btn>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ padding: "20px 24px", background: C.bg1, border: `1px solid ${C.line}`, borderRadius: 12, display: "flex", gap: 14, alignItems: "flex-start", marginBottom: 40 }}>
              <Lock size={16} color={C.ink3} style={{ marginTop: 3, flexShrink: 0 }} />
              <p style={{ fontFamily: UI, fontSize: 13.5, color: C.ink2, margin: 0, lineHeight: 1.6, maxWidth: 720 }}>
                Esta página não mostra o dossiê completo. Ela mostra a <span style={{ color: C.ink, fontWeight: 600 }}>prova mínima verificável</span> do caso. O conteúdo rico do caso permanece na camada operacional da plataforma.
              </p>
            </div>
          </>
        )}
        {!resultado && !erro && (
          <Card pad={48} style={{ textAlign: "center", borderStyle: "dashed", background: "transparent" }}>
            <ShieldCheck size={28} color={C.ink3} style={{ marginBottom: 14 }} />
            <p style={{ fontFamily: UI, fontSize: 14, color: C.ink2, margin: 0 }}>Cole o CAR completo no campo acima para verificar a prova mínima do caso.</p>
          </Card>
        )}
        <div style={{ textAlign: "center", padding: "40px 0 60px" }}>
          <Btn kind="ghost" icon={ArrowLeft} onClick={() => nav("home")}>Voltar para a plataforma</Btn>
        </div>
      </div>
      <Footer nav={nav} />
    </div>
  );
}

function DashTerritorio({ nav }) {
  const iframeRef = React.useRef(null);
  React.useEffect(function () {
    var fonte = document.getElementById("teu-front-rastro");
    if (fonte && iframeRef.current) {
      iframeRef.current.srcdoc = fonte.textContent;
    }
  }, []);
  return (
    <div style={{ background: C.bg, minHeight: "calc(100vh - 56px)" }}>
      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "20px 24px 8px" }}>
        <div style={{ fontFamily: UI, fontSize: 12.5, color: C.ink3, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 4 }}>Camada territorial</div>
        <div style={{ fontFamily: DISPLAY, fontSize: 26, color: C.ink, marginBottom: 2 }}>Mapa e verificação por CAR</div>
        <div style={{ fontFamily: UI, fontSize: 13.5, color: C.ink2 }}>Exploração territorial, filtros e verificação on-chain das propriedades.</div>
      </div>
      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "8px 24px 28px" }}>
        <div style={{ borderRadius: 16, overflow: "hidden", border: "1px solid " + C.line, boxShadow: "0 10px 40px rgba(0,0,0,0.35)", background: C.bg }}>
          <iframe ref={iframeRef} title="Rastro Territorio"
            style={{ width: "100%", height: "calc(100vh - 180px)", minHeight: 600, border: "none", display: "block" }} />
        </div>
      </div>
    </div>
  );
}

function App() {
  const [route, setRoute] = useState("home");
  const [walletConnected, setWalletConnected] = useState(false);
  const scrollRef = React.useRef(null);
  const nav = (to) => {
    setRoute(to);
    // rola o container interno do app para o topo (o window pode não rolar dentro do iframe)
    try { if (scrollRef.current) scrollRef.current.scrollTop = 0; } catch (e) {}
    try { window.scrollTo(0, 0); } catch (e) {}
    try { document.documentElement.scrollTop = 0; document.body.scrollTop = 0; } catch (e) {}
  };
  return (
    <div ref={scrollRef} style={{ background: C.bg, height: "100vh", overflowY: "auto", overflowX: "hidden" }}>
      <TopNav nav={nav} route={route} walletConnected={walletConnected} onConnectWallet={() => setWalletConnected((v) => !v)} />
      {route === "home" && <Home nav={nav} />}
      {route === "exportador" && <DashExportador nav={nav} />}
      {route === "importador" && <DashImportador nav={nav} />}
      {route === "auditor" && <DashAuditor nav={nav} />}
      {route === "territorio" && <DashTerritorio nav={nav} />}
      {route === "auditoria" && <Auditoria nav={nav} />}
    </div>
  );
}


const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(App));
</script>

.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
footer{height:36px;background:var(--sup);border-top:1px solid var(--b);padding:0 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ft-s{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--t3)}
.ft-c{font-size:10.5px;color:var(--t3)}
.sep{color:var(--b)}

/* ====== ESTRELAS / HISTÓRICO MAPBIOMAS ====== */
.estrelas{display:inline-flex;align-items:center;gap:2px;flex-wrap:wrap;min-height:14px}
.estrela{position:relative;font-size:14px;line-height:1;cursor:default}
.estrela.verde{color:#22c55e}
.estrela.vermelha{color:#dc2626}
.estrela .tip{visibility:hidden;opacity:0;position:absolute;bottom:140%;left:50%;transform:translateX(-50%);background:var(--t);color:#fff;font-size:10px;font-weight:500;padding:4px 8px;border-radius:6px;white-space:nowrap;z-index:9999;transition:opacity .12s;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.estrela .tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:var(--t)}
.estrela:hover .tip{visibility:visible;opacity:1}
.estrelas-bloco{display:flex;flex-direction:column;gap:5px}
.estrelas-linha{display:flex;align-items:center;gap:8px}
.estrelas-linha small{font-size:10.5px;color:var(--t3);min-width:74px}
.hist-msg{display:none;font-size:11px;margin-top:6px;padding:6px 8px;border-radius:var(--r)}
.hist-msg.ok{display:block;background:#dcfce7;color:#14532d}
.hist-msg.err{display:block;background:#fee2e2;color:#991b1b}
.saldo-card{background:var(--v4);border:1px solid var(--b);border-radius:var(--r2);padding:.75rem .85rem;margin:.35rem 0 .65rem}
.saldo-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:.55rem}
.saldo-status{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--t2)}
.saldo-icone{font-size:18px;line-height:1}.saldo-icone.pos{color:#22c55e}.saldo-icone.neg{color:#dc2626}.saldo-icone.neu{color:var(--t3)}
.saldo-num{font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px;background:#edf7f1;color:var(--v)}
.saldo-num.neg{background:#fee2e2;color:#991b1b}.saldo-num.neu{background:#f1f5f1;color:#6b897a}
.saldo-bar{position:relative;height:14px;border-radius:999px;background:#eef6f1;border:1px solid var(--b);display:flex;overflow:hidden}
.saldo-bar::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(13,31,22,.25);transform:translateX(-1px)}
.saldo-left,.saldo-right{width:50%;position:relative}.saldo-left{display:flex;justify-content:flex-end}.saldo-right{display:flex;justify-content:flex-start}
.saldo-fill-red{height:100%;background:#dc2626;border-radius:999px 0 0 999px}.saldo-fill-green{height:100%;background:#22c55e;border-radius:0 999px 999px 0}
.saldo-leg{display:flex;justify-content:space-between;margin-top:5px;font-size:10.5px;color:var(--t3)}
.saldo-leg strong{color:var(--t2);font-weight:600}

</style>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const GEOAPIFY_KEY   = 'dc783b9c4d184a4f95d4a7999f44ef13';
const SUPABASE_URL   = 'https://tqsoopgmzdwttwvedngk.supabase.co';
const SUPABASE_ANON  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxc29vcGdtemR3dHR3dmVkbmdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5NjIxNTEsImV4cCI6MjA5NDUzODE1MX0.LaHuxJVFJI9SkGHFmapSpkUYBC5plB9oPuDXIXJXsN0';
const CONTRACT_ADDR_PADRAO = '0x865724ffd417f5B696f31a8Af67541585fd2a262';
const SEPOLIA_ID     = '0xaa36a7';
const dbLocal = new PouchDB('rastro_config_local');

async function carregarContratoSalvo(){
  const input = document.getElementById('inp-contrato');
  try {
    const doc = await dbLocal.get('contrato_ativo');
    if(doc?.address && ethers.isAddress(doc.address)){
      input.value = doc.address;
      return doc.address;
    }
  } catch(e) {}
  input.value = CONTRACT_ADDR_PADRAO;
  return CONTRACT_ADDR_PADRAO;
}

async function salvarContratoAtual(){
  const input = document.getElementById('inp-contrato');
  const addr = input.value.trim();
  const err = document.getElementById('cad-err');
  const ok = document.getElementById('cad-ok');
  err.classList.remove('show');
  ok.classList.remove('show');
  if(!ethers.isAddress(addr)){
    err.textContent = 'Endereço de contrato inválido.';
    err.classList.add('show');
    return null;
  }
  let antigo = null;
  try { antigo = await dbLocal.get('contrato_ativo'); } catch(e) {}
  const doc = {
    _id: 'contrato_ativo',
    address: addr,
    updated_at: new Date().toISOString(),
  };
  if(antigo?._rev) doc._rev = antigo._rev;
  await dbLocal.put(doc);
  ok.textContent = '✓ Contrato salvo localmente neste navegador.';
  ok.classList.add('show');
  return addr;
}

function getContratoAtual(){
  const addr = document.getElementById('inp-contrato').value.trim();
  if(!ethers.isAddress(addr)){
    throw new Error('Endereço de contrato inválido.');
  }
  return addr;
}


// Escopo do contrato ativo ----------------------------------------------------
// O contrato salvo no PouchDB agora também controla o que a tela considera
// como análise válida. Sem isso, o front buscava o resultado antigo do Supabase
// apenas pelo codigo_car e podia mostrar uma análise gerada em outro contrato.
let _cacheCarsPorContrato = {};

async function listarCarsDoContratoAtual(force=false){
  const addr = getContratoAtual();
  const key = addr.toLowerCase();
  if(!force && Array.isArray(_cacheCarsPorContrato[key])) return _cacheCarsPorContrato[key];

  if(!window.ethereum){
    throw new Error('MetaMask não encontrada. Conecte a carteira para validar o contrato ativo.');
  }

  const provider = new ethers.BrowserProvider(window.ethereum);
  const contrato = new ethers.Contract(addr, CONTRACT_ABI, provider);
  const lista = await contrato.listarTodos();
  const normalizada = Array.from(lista || []).map(x => String(x).trim().toUpperCase());
  _cacheCarsPorContrato[key] = normalizada;
  return normalizada;
}
async function carEstaNoContratoAtual(codigoCar){
  const lista = await listarCarsDoContratoAtual(false);
  return lista.includes(String(codigoCar || '').trim().toUpperCase());
}
async function aplicarEscopoContratoAtual(f){
  if(!f) return f;
  const pertence = await carEstaNoContratoAtual(f.codigo_car);
  f._noContratoAtual = pertence;

  // Se o CAR não está no contrato ativo, não mostramos risco/Gemini antigo.
  // Mantemos os dados básicos apenas quando a tela decidir exibir detalhe público.
  if(pertence === false){
    f.rastro_resultados = [];
  }
  return f;
}
function mostrarAvisoContratoAtual(f){
  let aviso = document.getElementById('aviso-contrato-atual');
  const alvo = document.querySelector('#detalhe .det-sec:nth-of-type(3)') || document.getElementById('detalhe');
  if(!aviso){
    aviso = document.createElement('div');

// ── HISTÓRICO MAPBIOMAS / ESTRELAS ───────────────────────────────────────────
function nnum(v){
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

function primeiro(v){
  return Array.isArray(v) ? (v[0] || null) : (v || null);
}

async function buscarHistoricoMapbiomas(car){
  const rows = await sbFetch('rastro_mapbiomas_historico_numeros',
    `?codigo_car=eq.${encodeURIComponent(car)}&select=*`);
  return Array.isArray(rows) && rows.length ? rows[0] : null;
}

async function buscarHistoricosMapbiomasPorCars(cars){
  const unicos = [...new Set((cars || []).filter(Boolean))];
  const mapa = {};
  if(!unicos.length) return mapa;

  // Supabase REST aceita filtro in.(a,b,c). Em lotes evita URL gigante.
  for(let i=0;i<unicos.length;i+=80){
    const lote = unicos.slice(i, i+80);
    const filtro = lote.map(c => encodeURIComponent(c)).join(',');
    try{
      const rows = await sbFetch('rastro_mapbiomas_historico_numeros',
        `?codigo_car=in.(${filtro})&select=*`);
      if(Array.isArray(rows)){
        rows.forEach(h => { if(h?.codigo_car) mapa[h.codigo_car] = h; });
      }
    }catch(e){
      console.warn('Histórico por lote indisponível:', e);
    }
  }
  return mapa;
}

function calcularEstrelas(territorio){
  const fontes = Array.isArray(territorio?.rastro_analises_fontes) ? territorio.rastro_analises_fontes : [];

  const histFonte = fontes.find(x => x?.origem === 'MAPBIOMAS_HISTORICO') || null;
  const mbFonte = fontes.find(x => x?.origem === 'MAPBIOMAS') || null;
  const histPayload = histFonte?.payload || {};
  const histCol = histPayload?.colunas || {};
  const mbPayload = mbFonte?.payload || {};

  const totalAlertas = nnum(
    histFonte?.total_alertas ??
    histCol?.total_alertas ??
    histPayload?.total_alertas ??
    histPayload?.numberOfAlerts ??
    histPayload?.numero_alertas ??
    mbPayload?.numberOfAlerts
  );

  const areaDesmatada = nnum(
    histFonte?.area_desmatada_ha ??
    histCol?.area_desmatada_ha ??
    histPayload?.area_desmatada_ha ??
    histPayload?.areaHaAlertas ??
    mbPayload?.areaHaAlertas
  );

  const gee = primeiro(territorio?.rastro_mapbiomas_historico_numeros) || {};
  const segmento = gee.segmento_atual || gee.segmento || gee.segmento_dominante || null;
  const variacao = nnum(gee.variacao_nativa_2020_2024_ha ?? gee.variacao_nativa_ha);

  const ganho = Math.max(0, variacao);
  const perda = Math.max(0, areaDesmatada);
  const saldo = ganho - perda;
  const tolerancia = 0; // qualquer saldo positivo ja mostra estrela; qualquer saldo negativo mostra fogo

  let classificacao = 'NEUTRO';
  if(saldo > tolerancia) classificacao = 'POSITIVO';
  else if(saldo < -tolerancia) classificacao = 'NEGATIVO';

  return {
    ganho,
    perda,
    saldo,
    classificacao,
    totalAlertas: Math.max(0, Math.round(totalAlertas)),
    segmento,
  };
}

function htmlIconeHistorico(est){
  const saldoAbs = Math.abs(nnum(est.saldo)).toFixed(1);
  if(est.classificacao === 'POSITIVO'){
    return `<span class="estrela verde">★<span class="tip">Saldo positivo: +${saldoAbs} ha</span></span>`;
  }
  if(est.classificacao === 'NEGATIVO'){
    return `<span class="estrela vermelha">🔥<span class="tip">Saldo negativo: -${saldoAbs} ha</span></span>`;
  }
  return '<span style="font-size:11px;color:var(--t3)">neutro</span>';
}

function preencherBlocoEstrelas(est){
  const classificacaoEl = document.getElementById('d-estrelas-verde');
  const legadoVermelho = document.getElementById('d-estrelas-vermelha');
  const segmento = document.getElementById('d-segmento');
  const icone = document.getElementById('d-saldo-icone');
  const texto = document.getElementById('d-saldo-texto');
  const saldoNum = document.getElementById('d-saldo-num');
  const barraPerda = document.getElementById('d-barra-perda');
  const barraGanho = document.getElementById('d-barra-ganho');
  const perdaHa = document.getElementById('d-perda-ha');
  const ganhoHa = document.getElementById('d-ganho-ha');

  const ganho = nnum(est.ganho);
  const perda = nnum(est.perda);
  const saldo = nnum(est.saldo);
  const total = Math.max(ganho + perda, 1);
  const pctGanho = Math.min(100, (ganho / total) * 100);
  const pctPerda = Math.min(100, (perda / total) * 100);

  if(classificacaoEl) classificacaoEl.innerHTML = htmlIconeHistorico(est);
  if(legadoVermelho) legadoVermelho.innerHTML = '';
  if(segmento) segmento.textContent = est.segmento || '—';

  if(barraGanho) barraGanho.style.width = `${pctGanho}%`;
  if(barraPerda) barraPerda.style.width = `${pctPerda}%`;
  if(ganhoHa) ganhoHa.textContent = `${ganho.toFixed(1)} ha`;
  if(perdaHa) perdaHa.textContent = `${perda.toFixed(1)} ha`;

  if(icone && texto && saldoNum){
    icone.className = 'saldo-icone neu';
    saldoNum.className = 'saldo-num neu';
    icone.textContent = '•';
    texto.textContent = 'Saldo ambiental neutro';
    saldoNum.textContent = `${saldo.toFixed(1)} ha`;

    if(est.classificacao === 'POSITIVO'){
      icone.className = 'saldo-icone pos';
      saldoNum.className = 'saldo-num';
      icone.textContent = '★';
      texto.textContent = 'Recuperação vencendo';
      saldoNum.textContent = `+${saldo.toFixed(1)} ha`;
    } else if(est.classificacao === 'NEGATIVO'){
      icone.className = 'saldo-icone neg';
      saldoNum.className = 'saldo-num neg';
      icone.textContent = '🔥';
      texto.textContent = 'Desmatamento vencendo';
      saldoNum.textContent = `${saldo.toFixed(1)} ha`;
    }
  }
}

function normalizarBoundingBox(bb){
  if(Array.isArray(bb) && bb.length >= 4){
    const west=Number(bb[0]), south=Number(bb[1]), east=Number(bb[2]), north=Number(bb[3]);
    if([west,south,east,north].every(Number.isFinite)) return {west,south,east,north};
  }
  if(bb && typeof bb === 'object'){
    const west=Number(bb.west ?? bb.minLon ?? bb.xmin);
    const south=Number(bb.south ?? bb.minLat ?? bb.ymin);
    const east=Number(bb.east ?? bb.maxLon ?? bb.xmax);
    const north=Number(bb.north ?? bb.maxLat ?? bb.ymax);
    if([west,south,east,north].every(Number.isFinite)) return {west,south,east,north};
  }
  return null;
}

function normalizarGeoJSON(geojson){
  if(!geojson) return null;

  let gj=geojson;
  if(typeof gj === 'string'){
    try{
      gj=JSON.parse(gj);
    }catch{
      return null;
    }
  }

  if(!gj || typeof gj !== 'object') return null;

  if(gj.type === 'Feature' || gj.type === 'FeatureCollection'){
    return gj;
  }

  if(['Polygon','MultiPolygon','LineString','MultiLineString','Point','MultiPoint'].includes(gj.type)){
    return {
      type:'Feature',
      properties:{},
      geometry:gj,
    };
  }

  return null;
}

function criarHachuraMapa(){
  if(!detalheMap) return;
  const svg = detalheMap.getPanes().overlayPane.querySelector('svg');
  if(!svg) return;
  let defs = svg.querySelector('defs');
  if(!defs){
    defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
    svg.insertBefore(defs, svg.firstChild);
  }
  if(!defs.querySelector('#rastro-hachura-verde')){
    const pattern = document.createElementNS('http://www.w3.org/2000/svg','pattern');
    pattern.setAttribute('id','rastro-hachura-verde');
    pattern.setAttribute('patternUnits','userSpaceOnUse');
    pattern.setAttribute('width','10');
    pattern.setAttribute('height','10');
    pattern.setAttribute('patternTransform','rotate(45)');
    const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
    bg.setAttribute('width','10');
    bg.setAttribute('height','10');
    bg.setAttribute('fill','rgba(34,197,94,0.12)');
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1','0');
    line.setAttribute('y1','0');
    line.setAttribute('x2','0');
    line.setAttribute('y2','10');
    line.setAttribute('stroke','#22c55e');
    line.setAttribute('stroke-width','3');
    line.setAttribute('stroke-opacity','0.55');
    pattern.appendChild(bg);
    pattern.appendChild(line);
    defs.appendChild(pattern);
  }
}

function aplicarHachuraLayer(layer){
  setTimeout(()=>{
    criarHachuraMapa();
    const path = layer?._path;
    if(path){
      path.setAttribute('fill','url(#rastro-hachura-verde)');
      path.setAttribute('fill-opacity','1');
      path.setAttribute('stroke','#1a3828');
      path.setAttribute('stroke-width','3');
    }
  }, 60);
}

function wktParaGeoJSON(wkt){
  if(!wkt || typeof wkt !== 'string') return null;
  let texto = wkt.trim();
  const idx = texto.indexOf(';');
  if(texto.toUpperCase().startsWith('SRID=') && idx >= 0) texto = texto.slice(idx + 1).trim();
  const up = texto.toUpperCase();
  const ehMulti = up.startsWith('MULTIPOLYGON');
  const ehPoly = up.startsWith('POLYGON');
  if(!ehMulti && !ehPoly) return null;
  const inicio = texto.indexOf('(');
  const fim = texto.lastIndexOf(')');
  if(inicio < 0 || fim < 0) return null;
  const corpo = texto.slice(inicio, fim + 1);
  const parseAnel = anel => anel.split(',')
    .map(par => par.trim().split(/\s+/).map(Number))
    .filter(c => c.length >= 2 && c.every(Number.isFinite))
    .map(c => [c[0], c[1]]);
  try{
    if(ehMulti){
      let m = corpo.replace(/^\(/,'').replace(/\)$/,'');
      const fimPrimeiro = m.indexOf(')),');
      const primeiro = fimPrimeiro >= 0 ? m.slice(0, fimPrimeiro + 2) : m;
      const p = primeiro.replace(/^\(/,'').replace(/\)$/,'');
      const aneis = p.split(/\)\s*,\s*\(/).map(a => a.replace(/^\(/,'').replace(/\)$/,''));
      return {type:'Polygon', coordinates: aneis.map(parseAnel)};
    }
    const p = corpo.replace(/^\(/,'').replace(/\)$/,'');
    const aneis = p.split(/\)\s*,\s*\(/).map(a => a.replace(/^\(/,'').replace(/\)$/,''));
    return {type:'Polygon', coordinates: aneis.map(parseAnel)};
  }catch{
    return null;
  }
}

function extrairGeoJSONDoTerritorio(f){
  const porWkt = wktParaGeoJSON(f?.geometry_wkt || f?.payload?.geometryWkt || f?.payload?.geometry_wkt);
  if(porWkt) return porWkt;
  return f?.geojson || f?.geometry || f?.payload?.geometry || f?.payload?.geojson || null;
}

function renderMapaDetalhe(geojson, bb, f=null){
  const load=document.getElementById('det-mapa-load');
  const img=document.getElementById('det-mapa-img');
  const el=document.getElementById('det-leaflet-map');
  const bbox=normalizarBoundingBox(bb);
  const gj=normalizarGeoJSON(geojson);

  limparMapaDetalhe();
  img.style.display='none';
  load.style.display='none';
  el.style.display='block';

  detalheMap=L.map('det-leaflet-map',{
    zoomControl:true,
    attributionControl:false,
    scrollWheelZoom:false,
  });

  L.tileLayer(`https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png`,{
    maxZoom:20,
  }).addTo(detalheMap);

  let bounds=null;

  if(gj){
    detalheAreaLayer=L.geoJSON(gj,{
      style:{
        color:'#1a3828',
        weight:3,
        fillColor:'#22c55e',
        fillOpacity:.20,
        opacity:1,
      },
      pointToLayer:(_feature,latlng)=>L.circleMarker(latlng,{
        radius:8,
        color:'#1a3828',
        fillColor:'#22c55e',
        fillOpacity:.9,
        weight:2,
      }),
    }).addTo(detalheMap);

    bounds=detalheAreaLayer.getBounds();
    detalheAreaLayer.eachLayer(aplicarHachuraLayer);
  }

  if((!bounds || !bounds.isValid()) && bbox){
    bounds=L.latLngBounds([[bbox.south,bbox.west],[bbox.north,bbox.east]]);
    detalheAreaLayer=L.rectangle(bounds,{
      color:'#1a3828',
      weight:3,
      fillColor:'#22c55e',
      fillOpacity:.18,
      dashArray:'7 5',
    }).addTo(detalheMap);
    aplicarHachuraLayer(detalheAreaLayer);
  }

  // Fallback: se nao houver poligono nem bounding box, mostra so a localizacao aproximada.
  // Sem mensagem "indisponivel" e sem segundo mapa duplicado.
  if(!bounds || !bounds.isValid()){
    const lat = Number(f?.centroid_lat);
    const lon = Number(f?.centroid_lon);
    if(Number.isFinite(lat) && Number.isFinite(lon)){
      const areaHa = Number(f?.area_ha || 0);
      const raioM = areaHa > 0 ? Math.max(500, Math.sqrt(areaHa * 10000 / Math.PI)) : 1500;
      const centro = L.latLng(lat, lon);
      detalheAreaLayer=L.circle(centro,{
        radius:raioM,
        color:'#1a3828',
        weight:2,
        fillColor:'#22c55e',
        fillOpacity:.10,
        dashArray:'7 5',
      }).addTo(detalheMap);
      aplicarHachuraLayer(detalheAreaLayer);
      L.circleMarker(centro,{radius:6,fillColor:'#1a3828',color:'#fff',weight:2,fillOpacity:1}).addTo(detalheMap);
      bounds=detalheAreaLayer.getBounds();
    }
  }

  if(!bounds || !bounds.isValid()){
    el.style.display='none';
    load.style.display='none';
    return false;
  }

  detalheMap.fitBounds(bounds,{padding:[28,28]});
  setTimeout(()=>detalheMap.invalidateSize(),80);
  return true;
}

  if(mbHa) mbHa.textContent = mb?.payload?.areaHaAlertas ? (mb.payload.areaHaAlertas + ' ha') : '—';

  if(ibSt) ibSt.textContent = ib?.payload?.embargoStatus === 1 ? 'Embargado' : 'Regular';
}

// ── DETALHE ───────────────────────────────────────────────────────────────────
async function abrirDetalhe(car){
  document.getElementById('map').style.display='none';
  document.getElementById('legenda').style.display='none';
  document.getElementById('detalhe').classList.add('show');
  document.getElementById('det-car-cod').textContent=car;

  // Mapa estático
  const img=document.getElementById('det-mapa-img');
  const miniMap=document.getElementById('det-leaflet-map');
  const load=document.getElementById('det-mapa-load');
  img.style.display='none';
  miniMap.style.display='none';
  limparMapaDetalhe();
  load.style.display='flex';
  load.textContent='Carregando território…';

  // Busca dados completos no Supabase
  const rows = await sbFetch('rastro_territorios',
    `?codigo_car=eq.${encodeURIComponent(car)}&select=*,rastro_analises_fontes(*),rastro_resultados(*)`);
  const f = rows?.[0];

  if(!f){ load.textContent='Propriedade não encontrada.'; return; }

  await aplicarEscopoContratoAtual(f);
  mostrarAvisoContratoAtual(f);

  // Preenche a aba PROPRIEDADE imediatamente, antes de qualquer mapa/histórico.
  // Assim, se Leaflet, GeoJSON ou Edge Function falhar, Estado/Área/Sigla/Risco não somem.
  preencherPropriedadeEGemini(f);

  // Estrelas/segmento: usa tabela histórica separada, sem alterar os dados da propriedade.
  try{
    const hist = await buscarHistoricoMapbiomas(car);
    if(hist) f.rastro_mapbiomas_historico_numeros = hist;
  }catch(e){
    console.warn('Histórico MapBiomas indisponível:', e);
  }
  window._detalheAtual = f;
  preencherBlocoEstrelas(calcularEstrelas(f));

  // Mapa territorial
  const bb=normalizarBoundingBox(f.bounding_box);
  const gj=extrairGeoJSONDoTerritorio(f);
  try{
    renderMapaDetalhe(gj, bb, f);
  }catch(e){
    console.error('Erro ao renderizar mapa do detalhe:', e);
    limparMapaDetalhe();
    load.style.display='none';
  }

  // Reforço: o mapa nunca pode apagar/travar a seção Propriedade.
  preencherPropriedadeEGemini(f);

  // Status
  const sc=f.status==='ATIVO'?'bv':f.status==='PENDENTE'?'bp':'bi';
  const se=document.getElementById('d-status');
  se.className='badge '+sc; se.textContent=f.status;

  // Risco (vem de rastro_resultados)
  const resultado=f.rastro_resultados?.[0];
  const re=document.getElementById('d-risco');
  if(resultado?.risco){
    const rc='rb-'+resultado.risco[0].toLowerCase();
    re.className='rbadge '+rc; re.textContent=resultado.risco;
  } else {
    re.className='rbadge'; re.style.cssText='background:#f1f5f1;color:#6b897a'; re.textContent='N/A';
  }

  document.getElementById('d-estado').textContent=f.estado||'—';
  document.getElementById('d-area').textContent=f.area_ha?(f.area_ha+' ha'):'—';
  document.getElementById('d-data').textContent=f.created_at?new Date(f.created_at).toLocaleDateString('pt-BR'):'—';
  document.getElementById('d-sigla').textContent=f.state_acronym||'—';

  // Gemini
  if(resultado){
    const gr=document.getElementById('d-g-risco');
    gr.className='rbadge rb-'+resultado.risco?.[0]?.toLowerCase();
    gr.textContent=resultado.risco||'—';
    document.getElementById('d-g-just').textContent=resultado.justificativa||'—';
    document.getElementById('d-g-comp').textContent=resultado.compliance||'—';
    document.getElementById('d-g-int').textContent=resultado.interpretacao||'—';
    document.getElementById('d-g-res').textContent=resultado.resumo||'—';
  } else {
    ['d-g-risco','d-g-just','d-g-comp','d-g-int','d-g-res'].forEach(id=>{
      const el=document.getElementById(id);
      if(el){el.textContent='Análise pendente';el.className='gemini-campo-v';}
    });
  }

  // Fontes MapBiomas e IBAMA
  const mb=f.rastro_analises_fontes?.find(x=>x.origem==='MAPBIOMAS');
  const ib=f.rastro_analises_fontes?.find(x=>x.origem==='IBAMA');
  document.getElementById('d-mb-def').textContent=mb?.payload?.deforestationStatus===1?'Sim':'Não';
  document.getElementById('d-mb-alerts').textContent=mb?.payload?.numberOfAlerts??'—';
  document.getElementById('d-mb-ha').textContent=mb?.payload?.areaHaAlertas?(mb.payload.areaHaAlertas+' ha'):'—';
  document.getElementById('d-ib-emb').textContent=ib?.payload?.embargoStatus===1?'Sim':'Não';
  document.getElementById('d-ib-st').textContent=ib?.payload?.embargoStatus===1?'Embargado':'Regular';

  document.getElementById('detalhe').scrollTop=0;
}


async function atualizarHistorico(){
  const car = document.getElementById('det-car-cod').textContent.trim();
  if(!car || car === '—') return;

  const btn = document.getElementById('btn-atualizar-hist');
  const msg = document.getElementById('hist-msg');
  const original = btn.innerHTML;

  btn.disabled = true;
  btn.innerHTML = '<div class="spin" style="border-top-color:var(--v2)"></div> Buscando no MapBiomas…';
  msg.className = 'hist-msg';
  msg.textContent = '';

  try{
    const resp = await fetch(`${SUPABASE_URL}/functions/v1/mapibioma`, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':`Bearer ${SUPABASE_ANON}`,
      },
      body: JSON.stringify({ codigo_car: car }),
    });

    let data = {};
    try{ data = await resp.json(); }catch(_){ data = {}; }

    if(!resp.ok || data?.status !== 'OK'){
      throw new Error(data?.detalhe || data?.erro || data?.status || `HTTP ${resp.status}`);
    }

    const hist = {
      codigo_car: car,
      segmento_atual: data.segmento_atual,
      vegetacao_nativa_atual_ha: data.vegetacao_nativa_atual_ha,
      variacao_nativa_2020_2024_ha: data.variacao_nativa_2020_2024_ha,
      estrela_verde: data.estrela_verde === true,
    };

    // Atualiza só o bloco Histórico, usando também as fontes já carregadas
    // para comparar recuperação x desmatamento. Não mexe na aba Propriedade.
    const base = window._detalheAtual || {};
    base.rastro_mapbiomas_historico_numeros = hist;
    window._detalheAtual = base;
    preencherBlocoEstrelas(calcularEstrelas(base));

    msg.className = 'hist-msg ok';
    msg.textContent = `✓ Atualizado. Segmento: ${data.segmento_atual || '—'} · Veg. nativa: ${nnum(data.vegetacao_nativa_atual_ha).toFixed(1)} ha`;
  }catch(e){
    msg.className = 'hist-msg err';
    msg.textContent = 'Erro ao atualizar histórico: ' + (e.message || e);
  }

  btn.disabled = false;
  btn.innerHTML = original;
}

// ── SIDEBAR LISTA ─────────────────────────────────────────────────────────────
function buildLista(fazendas,label){
  const el=document.getElementById('sb-lista');
  el.innerHTML='';
  const hdr=document.getElementById('lista-hdr');
  if(fazendas===null){
    hdr.classList.remove('show');
    el.innerHTML='<div class="vazio">Selecione um estado para listar propriedades<br/>ou use "Verificar CAR" para busca individual.</div>';
    return;
  }
  hdr.classList.add('show');
  document.getElementById('lista-lbl').textContent=label||'Resultados';
  document.getElementById('lista-cnt').textContent=`${fazendas.length} propriedade${fazendas.length!==1?'s':''}`;
  if(!fazendas.length){
    el.innerHTML='<div class="vazio">Nenhuma propriedade encontrada.</div>';
    return;
  }
  GRUPOS.forEach(g=>{
    const items=fazendas.filter(g.fn);
    if(!items.length) return;
    const div=document.createElement('div');
    div.innerHTML=`
      <div class="grupo-h" onclick="toggleG(this,'grp-${g.k}')">
        <div class="g-esq"><div class="gdot ${g.dc}"></div><span class="glbl ${g.lc}">${g.l}</span></div>
        <div style="display:flex;align-items:center;gap:4px"><span class="gcnt ${g.cc}">${items.length}</span><span class="garr ab">▶</span></div>
      </div>
      <div class="g-itens ab" id="grp-${g.k}">
        ${items.map(f=>`
          <div class="fitem" id="fi-${f.codigo_car.replace(/[^a-zA-Z0-9]/g,'_')}" onclick="selFaz('${f.codigo_car}')">
            <div class="fcar">${f.codigo_car}</div>
            <div class="fmeta">${f.estado||''} · ${f.area_ha?(f.area_ha+' ha'):''}</div>
          </div>`).join('')}
      </div>`;
    el.appendChild(div);
  });
}

function toggleG(h,id){
  const el=document.getElementById(id);
  const arr=h.querySelector('.garr');
  el.classList.toggle('ab');
  arr.classList.toggle('ab',el.classList.contains('ab'));
}

function selFaz(car){
  document.querySelectorAll('.fitem').forEach(e=>e.classList.remove('sel'));
  const id='fi-'+car.replace(/[^a-zA-Z0-9]/g,'_');
  const el=document.getElementById(id);
  if(el){el.classList.add('sel');el.scrollIntoView({behavior:'smooth',block:'nearest'})}

  if(m){fecharDetalhe();m.openPopup();map.setView(m.getLatLng(),10,{animate:true});}
}

function destacarSidebar(car){
  document.querySelectorAll('.fitem').forEach(e=>e.classList.remove('sel'));
  const id='fi-'+car.replace(/[^a-zA-Z0-9]/g,'_');
  const el=document.getElementById(id);
  if(el){el.classList.add('sel');el.scrollIntoView({behavior:'smooth',block:'nearest'})}
}

// ── BUSCA CAR ─────────────────────────────────────────────────────────────────
async function buscarCAR(){
  const v=document.getElementById('inp-car').value.trim();
  if(!v) return;
  const btn=document.getElementById('btn-car');
  btn.innerHTML='<div class="spin"></div>';btn.disabled=true;
  document.getElementById('res-wrap').classList.remove('show');
  document.getElementById('res-erro').classList.remove('show');
  document.getElementById('res-conteudo').innerHTML='';

  const rows=await sbFetch('rastro_territorios',
    `?codigo_car=eq.${encodeURIComponent(v)}&select=*,rastro_resultados(*)`);
  const f=rows?.[0];

  btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> Verificar';
  btn.disabled=false;

  if(!f){
    document.getElementById('res-erro').classList.add('show');
    document.getElementById('res-wrap').classList.add('show');
    return;
  }

  try{
    await aplicarEscopoContratoAtual(f);
  }catch(e){
    document.getElementById('res-erro').textContent = e.message || String(e);
    document.getElementById('res-erro').classList.add('show');
    document.getElementById('res-wrap').classList.add('show');
    return;
  }

  if(f._noContratoAtual === false){
    const addr = getContratoAtual();
    document.getElementById('res-conteudo').innerHTML = `
      <div style="font-size:12px;line-height:1.55;padding:9px 10px;border-radius:8px;background:var(--sup)7ed;color:#7c2d12;border:1px solid #fed7aa">
        Este CAR existe na base pública do Rastro, mas <b>não está cadastrado no contrato ativo</b><br>
        <span style="font-family:'Courier New',monospace;font-size:10.5px">${addr}</span>
      </div>`;
    document.getElementById('res-wrap').classList.add('show');
    return;
  }

  const resultado=f.rastro_resultados?.[0];
  const risco=resultado?.risco;
  const sc=f.status==='ATIVO'?'bv':f.status==='PENDENTE'?'bp':'bi';
  const rb=risco?'rb-'+risco[0].toLowerCase():'';

  document.getElementById('res-conteudo').innerHTML=`
    <div class="mini-grid">
      <div class="mc"><p class="mc-l">Status</p><span class="badge ${sc}">${f.status}</span></div>
      <div class="mc"><p class="mc-l">Risco</p><span class="rbadge ${rb}" style="${!risco?'background:#f1f5f1;color:#6b897a':''}">${risco||'N/A'}</span></div>
      <div class="mc"><p class="mc-l">Estado</p><p class="mc-v">${f.estado||'—'}</p></div>
      <div class="mc"><p class="mc-l">Área</p><p class="mc-v">${f.area_ha?(f.area_ha+' ha'):'—'}</p></div>
    </div>
    ${f._noContratoAtual === false ? '<div style="font-size:11px;margin:6px 0 8px;padding:7px 9px;border-radius:8px;background:var(--sup)7ed;color:#7c2d12;border:1px solid #fed7aa">CAR não encontrado no contrato ativo. Risco/Gemini ocultados.</div>' : ''}
    <button class="btn btn-g" onclick="abrirDetalhe('${f.codigo_car}');document.getElementById('res-wrap').classList.remove('show')">
      Ver análise completa →
    </button>`;
  document.getElementById('res-wrap').classList.add('show');

  // Plota no mapa se tiver coordenadas
  if(f.centroid_lat&&!mkrs[f.codigo_car]){
    f._risco=risco;
    plotarFazenda(f);
  }
  resetMapa();
  if(mkrs[f.codigo_car]){
    mkrs[f.codigo_car].openPopup();
    map.setView(mkrs[f.codigo_car].getLatLng(),10,{animate:true});
  }
}

function limparCAR(){
  document.getElementById('inp-car').value='';
  document.getElementById('res-wrap').classList.remove('show');
  document.getElementById('res-conteudo').innerHTML='';
  document.getElementById('res-erro').classList.remove('show');
  fecharDetalhe();
  resetMapa();
}

// ── FILTRO ────────────────────────────────────────────────────────────────────
async function filtrar(){
  const estadoSel=document.getElementById('sel-estado').value;
  const riscoSel=document.getElementById('sel-risco').value;
  const segSel=document.getElementById('sel-segmento').value;
  if(!estadoSel){alert('Selecione um estado para filtrar.');return;}
  const sigla=estadoSel.match(/\(([A-Z]+)\)/)?.[1]||'';

  const rows=await sbFetch('rastro_territorios',
    `?state_acronym=eq.${sigla}&select=*,rastro_resultados(risco)`);

  const base = Array.isArray(rows) ? rows : [];
  const historicos = await buscarHistoricosMapbiomasPorCars(base.map(f => f.codigo_car));

  // Normaliza risco e junta o histórico MapBiomas, que é de onde vem o segmento.
  let fazendas=base.map(f=>{
    const hist = historicos[f.codigo_car] || null;
    if(hist) f.rastro_mapbiomas_historico_numeros = hist;
    return {
      ...f,
      _risco:f.rastro_resultados?.[0]?.risco||null,
      _estrelas:calcularEstrelas(f),
    };
  });

  if(riscoSel==='PENDENTE') fazendas=fazendas.filter(f=>f.status==='PENDENTE');
  else if(riscoSel==='INATIVO') fazendas=fazendas.filter(f=>f.status==='INATIVO');
  else if(riscoSel) fazendas=fazendas.filter(f=>f._risco===riscoSel);

  // Segmento só existe quando o histórico já foi calculado/alimentado.
  if(segSel) fazendas=fazendas.filter(f=>f._estrelas?.segmento===segSel);

  // Plota no mapa
  Object.values(mkrs).forEach(m=>m.remove());
  mkrs={};
  fazendas.forEach(plotarFazenda);

  let label=estadoSel;
  if(riscoSel) label+=` · ${riscoSel}`;
  if(segSel) label+=` · ${segSel}`;
  buildLista(fazendas,label);
  destacarMapa(fazendas);
}
function limparFiltro(){
  document.getElementById('sel-estado').value='';
  document.getElementById('sel-risco').value='';
  document.getElementById('sel-segmento').value='';
  buildLista(null);
  Object.values(mkrs).forEach(m=>m.remove());
  mkrs={};
  resetMapa();
}

// ── METAMASK ──────────────────────────────────────────────────────────────────
async function conectarWallet(){
  if(!window.ethereum){
    alert('MetaMask não encontrada. Instale a extensão MetaMask no seu navegador.');
    return;
  }
  try {
    const accounts=await window.ethereum.request({method:'eth_requestAccounts'});
    wallet=accounts[0];

    // Verifica se está na Sepolia
    const chainId=await window.ethereum.request({method:'eth_chainId'});
    if(chainId!==SEPOLIA_ID){
      try {
        await window.ethereum.request({
          method:'wallet_switchEthereumChain',
          params:[{chainId:SEPOLIA_ID}]
        });
      } catch(e) {
        alert('Por favor, mude para a rede Ethereum Sepolia no MetaMask.');
        return;
      }
    }

    const btn=document.getElementById('btn-mm');
    btn.classList.add('conectado');
    btn.innerHTML=`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> Conectado`;
    document.getElementById('wallet-addr').style.display='block';
    document.getElementById('wallet-addr').textContent=wallet.slice(0,6)+'...'+wallet.slice(-4);
    document.getElementById('btn-cad').disabled=false;
  } catch(e) {
    alert('Erro ao conectar MetaMask: '+e.message);
  }
}

async function cadastrar(){
  const car=document.getElementById('inp-cad').value.trim();
  if(!car){alert('Digite o código CAR.');return;}
  if(!wallet){alert('Conecte o MetaMask primeiro.');return;}

  const btn=document.getElementById('btn-cad');
  btn.innerHTML='<div class="spin"></div>';btn.disabled=true;
  document.getElementById('cad-ok').classList.remove('show');
  document.getElementById('cad-err').classList.remove('show');
  document.getElementById('tx-info').classList.remove('show');

  try {
    const provider = new ethers.BrowserProvider(window.ethereum);
    const signer = await provider.getSigner();
    const addr = getContratoAtual();
    await salvarContratoAtual();
    const contrato = new ethers.Contract(addr, [
      'function cadastrarCAR(string codigoCAR)',
      'function totalFazendas() view returns (uint256)',
      'function listarTodos() view returns (string[])'
    ], signer);

    const tx = await contrato.cadastrarCAR(car);

    document.getElementById('tx-info').classList.add('show');
    document.getElementById('tx-info').innerHTML=`Transação enviada, aguardando confirmação: <a href="https://sepolia.etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,18)}… ↗</a>`;

    const receipt = await tx.wait();

    if(receipt.status !== 1){
      throw new Error('A transação foi minerada, mas falhou no contrato.');
    }

    const total = await contrato.totalFazendas();
    _cacheCarsPorContrato = {};
    await listarCarsDoContratoAtual(true);

    document.getElementById('cad-ok').classList.add('show');
    document.getElementById('cad-ok').textContent=`✓ CAR cadastrado on-chain. Total de fazendas: ${total.toString()}.`;
    document.getElementById('tx-info').innerHTML=`Confirmada: <a href="https://sepolia.etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,18)}… ↗</a>`;
    document.getElementById('inp-cad').value='';
  } catch(e) {
    document.getElementById('cad-err').classList.add('show');
    document.getElementById('cad-err').textContent='Erro: '+(e.shortMessage||e.reason||e.message||'transação cancelada');
  }

  btn.innerHTML='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> Cadastrar';
  btn.disabled=false;
}
